<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: #212121;">
  <button id="fetch">Fetch Data</button>
  <div id="img_hit" style="color: aliceblue; margin-top: 20px;"></div>
</body>
<script>
    const requestUrl = 'https://api.github.com/users/hiteshchoudhary'
    const xhr = new XMLHttpRequest();
    xhr.open('GET', requestUrl)
    xhr.onreadystatechange = function(){
      //  console.log(xhr.readyState);
        if (xhr.readyState === 4) {
            const data = JSON.parse(this.responseText)
            //console.log( data);
            //console.log(`followers of hiteshchoudhary are ${data.followers}`);
            document.getElementById('img_hit').innerHTML = `<img src="${data.avatar_url}" style= width : 200px; border-radius: 50%;>`;
            const para = document.createElement('p');
            para.className = "followers";
            para.innerHTML = `<p>Followers of hiteshchoudhary are ${data.followers}</p>`;
            document.getElementsByTagName('body')[0].appendChild(para);
        }
    }
    document.getElementById('fetch').addEventListener('click', function(){
        xhr.send();
    })
   
</script>
</html>
